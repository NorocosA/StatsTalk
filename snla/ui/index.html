<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPSS Natural Language Assistant</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f7fa; color: #1a1a2e; height: 100vh; display: flex; }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-thumb { background: #c0c4cc; border-radius: 3px; }

/* Sidebar */
#sidebar { width: 280px; background: #fff; border-right: 1px solid #e4e7ed; display: flex; flex-direction: column; flex-shrink: 0; }
#sidebar h2 { padding: 20px; font-size: 18px; border-bottom: 1px solid #e4e7ed; color: #409eff; }
#sidebar .section { padding: 16px 20px; border-bottom: 1px solid #f0f0f0; }
#sidebar .section h3 { font-size: 13px; color: #909399; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
#file-input { width: 100%; font-size: 13px; }
#upload-btn { width: 100%; margin-top: 8px; padding: 8px; background: #409eff; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; }
#upload-btn:hover { background: #337ecc; }
#upload-btn:disabled { background: #a0cfff; cursor: not-allowed; }
#var-list { font-size: 13px; max-height: 200px; overflow-y: auto; }
#var-list .var-item { padding: 4px 0; display: flex; justify-content: space-between; }
#var-list .var-name { font-weight: 600; }
#var-list .var-type { color: #909399; font-size: 12px; }

/* Settings */
#settings-toggle { cursor: pointer; font-size: 13px; color: #409eff; }
#settings-panel { display: none; margin-top: 10px; }
#settings-panel.open { display: block; }
#settings-panel input { width: 100%; padding: 6px 8px; margin: 4px 0 8px; border: 1px solid #dcdfe6; border-radius: 4px; font-size: 12px; }
#settings-panel label { font-size: 12px; color: #606266; }
#save-settings { width: 100%; padding: 6px; background: #67c23a; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; }

/* Main chat */
#main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
#header { padding: 16px 24px; background: #fff; border-bottom: 1px solid #e4e7ed; font-size: 16px; font-weight: 600; display: flex; justify-content: space-between; align-items: center; }
#export-btn { padding: 6px 14px; background: #e6a23c; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; }
#export-btn:hover { background: #cf9236; }
#export-btn:disabled { background: #f0c78e; cursor: not-allowed; }

#messages { flex: 1; overflow-y: auto; padding: 20px 24px; }
.msg { margin-bottom: 16px; max-width: 85%; }
.msg.user { margin-left: auto; }
.msg.user .bubble { background: #409eff; color: #fff; border-radius: 16px 16px 4px 16px; padding: 12px 16px; }
.msg.assistant .bubble { background: #fff; border: 1px solid #e4e7ed; border-radius: 16px 16px 16px 4px; padding: 12px 16px; }
.msg .time { font-size: 11px; color: #909399; margin-top: 4px; }
.msg.assistant .time { text-align: left; }
.msg.user .time { text-align: right; }
.msg .syntax-toggle { font-size: 12px; color: #409eff; cursor: pointer; margin-top: 6px; display: inline-block; }
.msg pre { display: none; background: #f5f7fa; padding: 10px; border-radius: 6px; font-size: 12px; overflow-x: auto; margin-top: 6px; white-space: pre-wrap; }
.msg pre.show { display: block; }
.msg .stats { margin-top: 8px; font-size: 13px; color: #606266; }
.loading { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #409eff; animation: blink 1.4s infinite both; margin-right: 4px; }
.loading:nth-child(2) { animation-delay: 0.2s; }
.loading:nth-child(3) { animation-delay: 0.4s; }
@keyframes blink { 0%,80%,100% { opacity: 0; } 40% { opacity: 1; } }
.error-msg { color: #f56c6c; font-size: 13px; }

/* Input area */
#input-area { padding: 16px 24px; background: #fff; border-top: 1px solid #e4e7ed; display: flex; gap: 10px; }
#user-input { flex: 1; padding: 10px 16px; border: 1px solid #dcdfe6; border-radius: 20px; font-size: 14px; outline: none; }
#user-input:focus { border-color: #409eff; }
#send-btn { width: 44px; height: 44px; background: #409eff; color: #fff; border: none; border-radius: 50%; cursor: pointer; font-size: 18px; flex-shrink: 0; }
#send-btn:hover { background: #337ecc; }
#send-btn:disabled { background: #a0cfff; cursor: not-allowed; }

.status { text-align: center; color: #909399; font-size: 13px; padding: 10px; }
</style>
</head>
<body>

<!-- Sidebar -->
<aside id="sidebar">
    <h2>📊 SNLA</h2>
    <div class="section">
        <h3>📁 数据文件</h3>
        <input type="file" id="file-input" accept=".sav,.csv">
        <button id="upload-btn" disabled>上传并分析</button>
        <div id="upload-status" class="status"></div>
    </div>
    <div class="section" id="var-section" style="display:none">
        <h3>📋 变量概览 <span id="row-count"></span></h3>
        <div id="var-list"></div>
    </div>
    <div class="section">
        <span id="settings-toggle">⚙️ 设置</span>
        <div id="settings-panel">
            <label>LLM API 端点</label>
            <input id="s-endpoint" placeholder="https://opencode.ai/zen/go/v1/chat/completions">
            <label>API Key</label>
            <input id="s-key" type="password" placeholder="sk-...">
            <label>模型</label>
            <input id="s-model" placeholder="deepseek-v4-flash">
            <label>SPSS Python 路径</label>
            <input id="s-spss" placeholder="C:\Program Files\IBM\SPSS\Statistics\26\Python3\python.exe">
            <button id="save-settings">💾 保存</button>
        </div>
    </div>
</aside>

<!-- Main -->
<main id="main">
    <div id="header">
        <span>SPSS Natural Language Assistant</span>
        <button id="export-btn" disabled>📥 导出 Word 报告</button>
    </div>
    <div id="messages">
        <div class="msg assistant">
            <div class="bubble">
                <strong>👋 欢迎使用 SPSS 自然语言助手！</strong><br><br>
                用说话的方式完成统计分析。<br><br>
                <strong>快速开始：</strong><br>
                1. 👈 在左侧上传数据文件（.sav 或 .csv）<br>
                2. ✍️ 在下方输入分析需求<br>
                3. 📊 查看白话解读的结果<br><br>
                <em>示例：比较男女生在成绩上是否有显著差异</em>
            </div>
        </div>
    </div>
    <div id="input-area">
        <input id="user-input" type="text" placeholder="输入你的分析需求，例如：比较男女生成绩差异" disabled>
        <button id="send-btn" disabled>➤</button>
    </div>
</main>

<script>
// ── State ────────────────────────────────────────────────
let hasData = false;
let hasAnalysis = false;

// ── DOM ──────────────────────────────────────────────────
const fileInput = document.getElementById("file-input");
const uploadBtn = document.getElementById("upload-btn");
const uploadStatus = document.getElementById("upload-status");
const varSection = document.getElementById("var-section");
const varList = document.getElementById("var-list");
const rowCount = document.getElementById("row-count");
const messagesEl = document.getElementById("messages");
const userInput = document.getElementById("user-input");
const sendBtn = document.getElementById("send-btn");
const exportBtn = document.getElementById("export-btn");
const settingsToggle = document.getElementById("settings-toggle");
const settingsPanel = document.getElementById("settings-panel");

// ── File upload enable ───────────────────────────────────
fileInput.addEventListener("change", () => {
    uploadBtn.disabled = !fileInput.files.length;
});
uploadBtn.addEventListener("click", uploadFile);

// ── Upload ───────────────────────────────────────────────
async function uploadFile() {
    const file = fileInput.files[0];
    if (!file) return;

    uploadBtn.disabled = true;
    uploadStatus.textContent = "上传中...";

    const form = new FormData();
    form.append("file", file);

    try {
        const resp = await fetch("/api/upload", { method: "POST", body: form });
        const data = await resp.json();
        if (data.ok) {
            hasData = true;
            uploadStatus.textContent = `✅ ${data.filename} (${data.row_count} 行)`;
            userInput.disabled = false;
            sendBtn.disabled = false;
            renderVariables(data.variables, data.row_count);
        } else {
            uploadStatus.textContent = `❌ ${data.error}`;
        }
    } catch (e) {
        uploadStatus.textContent = `❌ 上传失败: ${e.message}`;
    }
    uploadBtn.disabled = !fileInput.files.length;
}

// ── Variables ─────────────────────────────────────────────
function renderVariables(vars, rows) {
    varSection.style.display = "block";
    rowCount.textContent = `(${rows} 条记录)`;
    varList.innerHTML = vars.map(v => `
        <div class="var-item">
            <span class="var-name">${esc(v.label || v.name)}</span>
            <span class="var-type">${esc(v.type)}</span>
        </div>
    `).join("");
}

// ── Send ─────────────────────────────────────────────────
sendBtn.addEventListener("click", sendMessage);
userInput.addEventListener("keydown", e => { if (e.key === "Enter") sendMessage(); });

async function sendMessage() {
    const text = userInput.value.trim();
    if (!text || !hasData) return;

    addMessage("user", text);
    userInput.value = "";
    userInput.disabled = true;
    sendBtn.disabled = true;

    const loadingId = addMessage("assistant", '<span class="loading"></span><span class="loading"></span><span class="loading"></span> 正在分析...');

    try {
        const resp = await fetch("/api/analyze", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ text }),
        });
        const data = await resp.json();
        removeMessage(loadingId);

        if (data.ok) {
            hasAnalysis = true;
            exportBtn.disabled = false;
            addAnalysisResult(data);
        } else {
            addMessage("assistant", `<span class="error-msg">❌ ${esc(data.error)}</span>`);
            if (data.syntax) {
                addMessage("assistant", `<span class="syntax-toggle" onclick="this.nextElementSibling.classList.toggle('show')">📝 查看语法</span><pre>${esc(data.syntax)}</pre>`);
            }
        }
    } catch (e) {
        removeMessage(loadingId);
        addMessage("assistant", `<span class="error-msg">❌ 请求失败: ${esc(e.message)}</span>`);
    }

    userInput.disabled = false;
    sendBtn.disabled = false;
    userInput.focus();
}

// ── Messages ──────────────────────────────────────────────
let msgId = 0;
function addMessage(role, content) {
    const id = ++msgId;
    const div = document.createElement("div");
    div.className = `msg ${role}`;
    div.id = `msg-${id}`;
    div.innerHTML = `<div class="bubble">${content}</div>`;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return id;
}
function removeMessage(id) {
    const el = document.getElementById(`msg-${id}`);
    if (el) el.remove();
}

function addAnalysisResult(data) {
    let html = `<strong>📊 ${esc(data.method)}</strong>`;
    if (data.explanation) {
        html += `<br><br>${formatExplanation(data.explanation)}`;
    }
    if (data.syntax) {
        html += `<br><span class="syntax-toggle" onclick="this.nextElementSibling.classList.toggle('show')">📝 查看语法</span><pre>${esc(data.syntax)}</pre>`;
    }
    if (data.result && data.result.statistics) {
        html += '<div class="stats">';
        for (const [k, v] of Object.entries(data.result.statistics)) {
            html += `${esc(k)}: ${esc(String(v))}<br>`;
        }
        html += '</div>';
    }
    addMessage("assistant", html);
}

function formatExplanation(text) {
    return text.replace(/\n/g, "<br>").replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
}

// ── Export ────────────────────────────────────────────────
exportBtn.addEventListener("click", async () => {
    exportBtn.disabled = true;
    exportBtn.textContent = "生成中...";
    try {
        const resp = await fetch("/api/export");
        if (resp.ok) {
            const blob = await resp.blob();
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = "snla_report.docx";
            a.click();
            URL.revokeObjectURL(url);
        } else {
            const data = await resp.json();
            alert("导出失败: " + data.error);
        }
    } catch (e) {
        alert("导出失败: " + e.message);
    }
    exportBtn.disabled = false;
    exportBtn.textContent = "📥 导出 Word 报告";
});

// ── Settings ──────────────────────────────────────────────
settingsToggle.addEventListener("click", () => settingsPanel.classList.toggle("open"));
document.getElementById("save-settings").addEventListener("click", async () => {
    const data = {
        LLM_ENDPOINT: document.getElementById("s-endpoint").value,
        LLM_API_KEY: document.getElementById("s-key").value,
        LLM_MODEL: document.getElementById("s-model").value,
        SPSS_PYTHON_PATH: document.getElementById("s-spss").value,
    };
    try {
        await fetch("/api/settings", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data),
        });
        alert("✅ 设置已保存");
    } catch (e) {
        alert("保存失败: " + e.message);
    }
});

// ── Utils ─────────────────────────────────────────────────
function esc(s) {
    if (!s) return "";
    return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
</script>
</body>
</html>
