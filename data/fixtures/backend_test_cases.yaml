# ============================================================================
# QUICK REFERENCE — Method to Field Mapping
# ============================================================================
#
# method                 | Fields used by executor execute()
# -----------------------+-----------------------------------------------
# independent_t_test     | grouping_var, test_var, groups
# paired_t_test          | var1, var2
# oneway_anova           | grouping_var, test_var
# simple_regression      | dep_var, indep_var
# pearson_correlation    | var1, var2
# spearman_correlation   | var1, var2
# correlations (generic) | var1, var2
# chi_square             | grouping_var, test_var
# crosstabs              | grouping_var, test_var
# frequencies            | test_var (or grouping_var)
# descriptives           | test_var (or grouping_var)
# mann_whitney_u         | grouping_var, test_var, groups
# kruskal_wallis         | grouping_var, test_var
#
# TEMPLATE kwarg equivalents:
#   grouping_var → group_var    (ttest_independent, anova_oneway, m-w, k-w)
#   test_var     → test_var     (ttest_independent, anova_oneway, m-w, k-w)
#   test_var     → var          (frequencies, descriptives)
#   dep_var      → dep_var      (regression_simple)
#   indep_var    → indep_var    (regression_simple)
#   var1         → var1         (paired_ttest, correlations, spearman)
#   var2         → var2         (paired_ttest, correlations, spearman)
#   groups       → groups       (ttest_independent, mann_whitney)
#   grouping_var → row_var      (crosstabs for chi_square)
#   test_var     → col_var      (crosstabs for chi_square)
